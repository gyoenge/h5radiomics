# =========================
# Common (shared)
# =========================
sample_ids:
  - TENX95
  - NCBI785
  - NCBI783
  - TENX99

input_dir: /root/workspace/hest-radiomics/data/h5
output_dir: /root/workspace/hest-radiomics/data/outputs


# =========================
# Extract (radiomics)
# =========================
label: 255

classes:
  - firstorder
  - glcm
  - glrlm
  - glszm
  - gldm
  - ngtdm

filters:
  - Original

image_type_settings:
  LoG:
    sigma: [1.0, 2.0, 3.0]

num_workers: 8
save_patches: true

processing:
  lower_q: 0.01
  upper_q: 0.99
  save_processed: true


# =========================
# Statistics
# =========================
status_filter: ok
drop_diagnostic: true

save_per_sample: true
save_merged: false

save_representatives: true
representative_image_col: color_path
representative_stats:
  - min
  - q10
  - q25
  - q50
  - q75
  - q90
  - max

save_boxplot: true


# =========================
# Segment (CellViT)
# =========================
model_dir: /root/workspace/hest-radiomics/models
model_name: CellViT-SAM-H-x20.pth

batch_size: 8
num_workers: 0
device: cuda:0

patch_indices: null   # null or "all" or [0,1,2,...]

save_png_overlay: true
use_class_color: true
save_geojson_per_patch: false

postprocess_threads: 4
verbose: false