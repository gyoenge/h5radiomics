# =========================
# Common (shared)
# =========================
sample_ids:
  # - TENX99
  # - TENX95
  # - NCBI785
  # - NCBI783
  - sample 

input_dir: /root/workspace/hest-radiomics/data/h5
output_dir: /root/workspace/hest-radiomics/data/outputs


# =========================
# Extract (radiomics)
# =========================
label: 1

classes:
  - firstorder
  - glcm
  - glrlm
  - glszm
  - gldm
  - ngtdm

filters:
  - Original
  # - Wavelet
  # - LoG
  # - Square
  # - SquareRoot
  # - Logarithm
  # - Exponential

image_type_settings:
  LoG:
    sigma: [1.0, 2.0, 3.0]

num_workers: 16
save_patches: false  

# cellseg-based extraction
mask_source: cellseg          # threshold | cellseg
celltype_mode: merged      # merged | per_class | single
target_cell_type: null        # used only when celltype_mode=single
cellseg_path: null            # auto: {output_dir}/{sample_id}/cellvitseg/cellseg.parquet

processing:
  lower_q: 0.01
  upper_q: 0.99
  save_processed: true


# =========================
# Statistics
# =========================
status_filter: ok
drop_diagnostic: true

save_per_sample: true
save_merged: false

# save_representatives: true
save_representatives: false 
representative_image_col: color_path
representative_stats:
  - min
  - q10
  - q25
  - q50
  - q75
  - q90
  - max

save_boxplot: true


# =========================
# Segment (CellViT)
# =========================
model_dir: /root/workspace/hest-radiomics/data/models
model_name: CellViT-SAM-H-x20.pth

batch_size: 8
device: cuda:0

# segment용 worker와 extract용 worker가 같은 키(num_workers)를 공유하면 충돌할 수 있음.
# 현재 구조상 full config에서 num_workers는 extract 쪽 값(8)으로도 쓰일 수 있으니,
# segment loader worker를 꼭 따로 나누고 싶으면 run_segment / config 구조도 분리하는 게 안전함.
patch_indices: null   # null or "all" or [0,1,2,...]

save_png_overlay: false 
use_class_color: true
save_geojson_per_patch: false

postprocess_threads: 1
verbose: false

